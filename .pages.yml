# Pages CMS config (CMS-01 / CMS-02) — renovart Astro project.
# Lives at the GIT REPO ROOT (this Astro project dir = the dir Pages CMS is pointed at).
# All paths below are relative to THIS repo root (the actual code repo is the inner
# `renovart/` dir of the working tree; `.planning/` lives in the unversioned parent and
# is NOT part of this repo). RESEARCH Pattern 1/2; CLAUDE.md "Pages CMS — .pages.yml".

media:
  # Single global media browser (D-01): ONE shared, src/-rooted folder for all lucrari
  # imagery so astro:assets optimizes uploads (D-02), not the verbatim-copied public/.
  - name: lucrari
    label: Imagini lucrări
    input: src/assets/lucrari # where the CMS commits uploaded binaries in the repo
    # CRITICAL (Pitfall 1): `output` is the prefix written INTO frontmatter strings; it
    # MUST equal the import.meta.glob key in resolveLucrareImage.ts, i.e. /src/assets/lucrari.
    # This deliberately differs from CLAUDE.md's literal public-style `/media` example —
    # a public path would never match the glob key and the build would fail closed.
    output: /src/assets/lucrari
    extensions: [jpg, jpeg, png, webp]
    categories: [image]

content:
  - name: lucrari
    label: Lucrări (proiecte)
    type: collection
    path: src/content/lucrari
    format: yaml-frontmatter # frontmatter + markdown body round-trip
    view:
      fields: [title, location, date, featured]
    fields:
      - name: title
        label: Titlu
        type: string
      - name: location
        label: Locație
        type: string
      - name: date
        label: Dată
        type: date
        options:
          format: yyyy-MM-dd # matches z.coerce.date()
      - name: featured
        label: Afișează pe pagina principală
        type: boolean
        description: Bifați pentru a evidenția acest proiect pe prima pagină.
      - name: coverImage
        label: Imagine principală (copertă)
        type: image
        options:
          media: lucrari
      # Before/after comparisons → slider. The object+list shape makes before↔după
      # misalignment structurally impossible in the form (D-04).
      - name: pairs
        label: Perechi Înainte / După
        type: object
        list: true
        description: Adăugați câte o pereche pentru fiecare comparație înainte/după.
        fields:
          - name: before
            label: Înainte
            type: image
            options:
              media: lucrari
          - name: after
            label: După
            type: image
            options:
              media: lucrari
      # After-only photos → gallery (D-05). type: image + list: true yields a flat
      # string[] matching gallery: z.array(z.string()) (RESEARCH Open Q2).
      - name: gallery
        label: Galerie (doar „După”)
        type: image
        list: true
        options:
          media: lucrari
        description: Fotografii ale lucrării finalizate (când nu există imagini „înainte”).
      - name: body
        label: Descriere
        type: rich-text
      # NOTE: `category` is intentionally NOT exposed (D-08) — no filtering UI consumes
      # it; it stays an optional schema field in src/content.config.ts, hidden from the form.

  # ── Phase 5 editable marketing copy (CMS-03, D-08/D-09/D-11) ────────────────
  # Three `type: file` singletons over the src/data/copy/*.json files loaded by
  # the faqCopy/servicesCopy/trustCopy collections. STRUCTURED plain-text fields
  # only (type string/text/select) — the rich body editor stays reserved for the
  # lucrari project body above (D-08). Romanian labels + `description` help text
  # stating the UI-SPEC char caps.
  - name: faqCopy
    label: Întrebări frecvente
    type: file
    path: src/data/copy/faq.json
    format: json
    list: true # whole file is a top-level array of Q&A items
    fields:
      - name: id
        label: Identificator (nu modificați)
        type: string
        description: Cod intern al întrebării. Lăsați neschimbat.
      - name: question
        label: Întrebare
        type: string
        description: 'Trebuie să se termine cu „?". Maxim ~80 de caractere.'
      - name: answer
        label: Răspuns
        type: text
        description: 'Începeți cu răspunsul direct. Maxim ~600 de caractere.'
  - name: servicesCopy
    label: Servicii (texte)
    type: file
    path: src/data/copy/services.json
    format: json
    list: true # whole file is a top-level array of 6 services
    fields:
      - name: slug
        label: Identificator (nu modificați)
        type: string
        description: Cod intern al serviciului. Lăsați neschimbat.
      - name: title
        label: Titlu serviciu
        type: string
        description: 'Maxim ~60 de caractere.'
      - name: description
        label: Descriere serviciu
        type: text
        description: 'Maxim ~400 de caractere.'
      - name: icon
        label: Pictogramă
        type: select
        description: Alegeți din lista fixă.
        options:
          values: [paint, stairs, rail, door, bulb, shield]
  - name: trustCopy
    label: Statistici de încredere
    type: file
    path: src/data/copy/trust.json
    format: json
    fields:
      - name: yearsExperience
        label: Ani de experiență
        type: string
      - name: worksCompleted
        label: Lucrări finalizate
        type: string
      - name: warrantyText
        label: Garanție (text)
        type: text
      - name: warrantyMonths
        label: Garanție (durată — opțional)
        type: string
        description: 'Opțional. Lăsați gol pentru formularea calitativă (D-05).'
      - name: turnaroundDays
        label: Termen execuție (opțional)
        type: string
        description: 'Opțional. Lăsați gol pentru «termene scurte».'
  # homeCopy — Home page chrome. Object-format JSON singleton: the editable
  # fields live under the single top-level `main` key, mirrored by the `main`
  # object field below (same convention as the object-format files). Structured
  # plain-text fields only; heading levels, classes and CTA links stay fixed in
  # code (D-08). Help text states the UI-SPEC char caps.
  - name: homeCopy
    label: Pagina principală (texte)
    type: file
    path: src/data/copy/home.json
    format: json
    fields:
      - name: main
        label: Conținut pagină principală
        type: object
        fields:
          - name: eyebrow
            label: Supratitlu (deasupra titlului)
            type: string
            description: 'Frază scurtă, fără punct. Maxim ~40 de caractere.'
          - name: headline
            label: Titlu principal
            type: string
            description: 'O singură idee, beneficiu clar. Maxim ~60 de caractere.'
          - name: lead
            label: Subtitlu (intro)
            type: text
            description: '1–2 propoziții. Maxim ~220 de caractere.'
          - name: servicesHeading
            label: Titlu secțiune „Ce facem”
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: servicesIntro
            label: Text secțiune „Ce facem”
            type: text
            description: 'Maxim ~300 de caractere.'
          - name: trustHeading
            label: Titlu secțiune „De ce ne aleg”
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: trustIntro
            label: Text secțiune „De ce ne aleg”
            type: text
            description: 'Maxim ~300 de caractere.'
          - name: featuredHeading
            label: Titlu secțiune „Lucrări recente”
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: stepsHeading
            label: Titlu secțiune „Cum lucrăm”
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: steps
            label: Pași „Cum lucrăm”
            type: object
            list: true
            description: 'Între 3 și 4 pași. Fiecare cu un nume scurt și o frază.'
            fields:
              - name: name
                label: Nume pas
                type: string
                description: 'Maxim ~30 de caractere.'
              - name: text
                label: Descriere pas
                type: text
                description: 'Maxim ~160 de caractere.'
          - name: closingHeading
            label: Titlu secțiune finală (CTA)
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: closingLead
            label: Text secțiune finală (CTA)
            type: text
            description: 'Maxim ~300 de caractere.'
          - name: ctaCallLabel
            label: Etichetă buton «Sună»
            type: string
            description: 'Maxim 12 caractere.'
          - name: ctaWaLabel
            label: Etichetă buton «WhatsApp»
            type: string
            description: 'Maxim 12 caractere.'
  # serviciiCopy — Servicii page chrome (object-format singleton, `main` key).
  # The six service blocks themselves are edited under „Servicii (texte)” above.
  - name: serviciiCopy
    label: Pagina Servicii (texte)
    type: file
    path: src/data/copy/servicii.json
    format: json
    fields:
      - name: main
        label: Conținut pagină Servicii
        type: object
        fields:
          - name: headline
            label: Titlu principal
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: lead
            label: Subtitlu (intro)
            type: text
            description: '1–2 propoziții. Maxim ~300 de caractere.'
          - name: closingHeading
            label: Titlu secțiune finală (CTA)
            type: string
            description: 'Maxim ~60 de caractere.'
          - name: closingLead
            label: Text secțiune finală (CTA)
            type: text
            description: 'Maxim ~300 de caractere.'
          - name: ctaCallLabel
            label: Etichetă buton «Sună»
            type: string
            description: 'Maxim 12 caractere.'
          - name: ctaWaLabel
            label: Etichetă buton «WhatsApp»
            type: string
            description: 'Maxim 12 caractere.'
